# kubeadm cluster configuration
# Edit controlPlaneEndpoint and advertiseAddress before init.
# Apply: kubeadm init --config kubeadm/kubeadm-config.yaml
#
# Load balancer options (run kubeadm/scripts/00-configure-lb.sh first):
#   Option A — External VIP/LB (recommended for HA API):
#     keepalived + HAProxy TCP 6443 → kubeadm/docs/load-balancer-external.md
#     Set controlPlaneEndpoint to LB DNS (e.g. cp.example.com:6443).
#   Option B — MetalLB (post-init, for Service type=LoadBalancer):
#     kubeadm/addons/apply-addons.sh --with-metallb
#     Does not replace external API VIP during bootstrap.
#   Or use 03-init-control-plane.sh with CONTROL_PLANE_DNS / CONTROL_PLANE_IP.
---
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: v1.29.15
controlPlaneEndpoint: "cp.example.com:6443"
networking:
  podSubnet: "192.168.0.0/16"
  serviceSubnet: "10.96.0.0/12"
clusterName: kubernetes
controllerManager:
  extraArgs:
    bind-address: "0.0.0.0"
scheduler:
  extraArgs:
    bind-address: "0.0.0.0"
etcd:
  local:
    dataDir: /var/lib/etcd
---
apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: "192.168.1.10"
  bindPort: 6443
nodeRegistration:
  criSocket: unix:///var/run/containerd/containerd.sock
  kubeletExtraArgs:
    cgroup-driver: systemd
---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd
---
apiVersion: kubeproxy.config.k8s.io/v1alpha1
kind: KubeProxyConfiguration
mode: iptables
