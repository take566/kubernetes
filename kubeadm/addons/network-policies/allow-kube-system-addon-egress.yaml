# kube-system addons that must reach the Kubernetes API (10.96.0.1:443) and upstream DNS.
# Without these, blanket allow-dns-egress (DNS-only) blocks CoreDNS and Calico controllers.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-coredns-egress
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      k8s-app: kube-dns
  policyTypes:
    - Egress
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-calico-controllers-egress
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      k8s-app: calico-kube-controllers
  policyTypes:
    - Egress
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-calico-node-egress
  namespace: kube-system
spec:
  podSelector:
    matchLabels:
      k8s-app: calico-node
  policyTypes:
    - Egress
  egress:
    - {}
