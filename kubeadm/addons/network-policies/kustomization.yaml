# Opt-in baseline NetworkPolicies (Calico-compatible).
# Apply: kubectl apply -k kubeadm/addons/network-policies/
# Or:    kubeadm/addons/apply-addons.sh --with-network-policies
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - default-deny.yaml
  - allow-dns.yaml
  - allow-ingress-controller.yaml
  - allow-controller-egress.yaml
  - allow-kube-system-metrics.yaml
