# ingress-nginx controller egress.
# Calico on kubeadm may route kubernetes.default (10.96.0.1:443) via node/pod IPs after
# kube-proxy DNAT — port-only or Service-CIDR rules are insufficient. Allow all egress for
# the controller; ingress is still restricted by default-deny + allow-ingress-controller.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-controller-egress-backends
  namespace: ingress-nginx
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
      app.kubernetes.io/component: controller
  policyTypes:
    - Egress
  egress:
    - {}
