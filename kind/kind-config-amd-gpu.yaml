# kind cluster config for local AMD GPU testing
# Docs: https://kind.sigs.k8s.io/docs/user/configuration/
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "role=dev-worker"
    extraMounts:
      # WSL2 AMD/NVIDIA paravirtualization (required on Windows Docker Desktop)
      - hostPath: /dev/dxg
        containerPath: /dev/dxg
      # Linux bare-metal ROCm only — uncomment when /dev/dri and /dev/kfd exist on the Docker host:
      # - hostPath: /dev/dri
      #   containerPath: /dev/dri
      # - hostPath: /dev/kfd
      #   containerPath: /dev/kfd
