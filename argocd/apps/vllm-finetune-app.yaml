apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vllm-finetune
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/take566/kubernetes.git
    targetRevision: master
    path: vllm/finetune
  destination:
    server: https://kubernetes.default.svc
    namespace: vllm
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
