# Primary production vLLM stack (NVIDIA) for kubeadm clusters.
# Uses local-path PVCs — do NOT enable vllm-amd auto-sync in the same namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vllm-kubeadm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/cluster: kubeadm
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/take566/kubernetes.git
    targetRevision: master
    path: vllm/overlays/kubeadm
  destination:
    server: https://kubernetes.default.svc
    namespace: vllm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
