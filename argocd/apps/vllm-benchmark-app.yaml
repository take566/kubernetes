# Manual sync only — benchmark Jobs should not run continuously in production.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vllm-benchmark
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: vllm
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/take566/kubernetes.git
    targetRevision: master
    path: vllm/benchmark
  destination:
    server: https://kubernetes.default.svc
    namespace: vllm
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
