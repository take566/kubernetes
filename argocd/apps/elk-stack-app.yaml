# Manual sync — ELK stack is stateful; avoid unintended data/index changes.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elk-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/take566/kubernetes.git
    targetRevision: master
    path: elk-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: elk-stack
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
