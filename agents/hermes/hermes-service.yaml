apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: agents
  labels:
    app: hermes
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: agents
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app: hermes
  ports:
    - name: gateway
      port: 8642
      targetPort: gateway
      protocol: TCP
    - name: dashboard
      port: 9119
      targetPort: dashboard
      protocol: TCP
