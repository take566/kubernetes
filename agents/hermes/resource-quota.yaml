apiVersion: v1
kind: ResourceQuota
metadata:
  name: agents-quota
  namespace: agents
  labels:
    app.kubernetes.io/part-of: agents
    app.kubernetes.io/managed-by: kustomize
spec:
  hard:
    requests.cpu: "2"
    limits.cpu: "4"
    requests.memory: 4Gi
    limits.memory: 8Gi
    persistentvolumeclaims: "4"
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: agents-limits
  namespace: agents
  labels:
    app.kubernetes.io/part-of: agents
    app.kubernetes.io/managed-by: kustomize
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 1Gi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
