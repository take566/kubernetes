apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: agents
  labels:
    app.kubernetes.io/part-of: agents
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-allow-namespace
  namespace: agents
  labels:
    app: hermes
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: agents
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: hermes
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8642
        - protocol: TCP
          port: 9119
