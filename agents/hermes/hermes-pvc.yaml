apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: agents
  labels:
    app: hermes
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: agents
    app.kubernetes.io/managed-by: kustomize
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
