apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: agents
  labels:
    app: hermes
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: agents
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
        app.kubernetes.io/name: hermes
        app.kubernetes.io/part-of: agents
        app.kubernetes.io/managed-by: kustomize
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          args: ["gateway", "run"]
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          env:
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: GATEWAY_HEALTH_URL
              value: "http://127.0.0.1:8642/healthz"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: OPENAI_API_KEY
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secret
                  key: API_SERVER_KEY
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 8642
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
