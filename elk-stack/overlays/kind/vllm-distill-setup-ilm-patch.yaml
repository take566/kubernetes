apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-vllm-distill-setup
  namespace: elk-stack
spec:
  template:
    spec:
      containers:
        - name: setup
          env:
            - name: ES_URL
              value: "http://elasticsearch:9200"
            - name: ILM_POLICY
              value: "vllm-distill-kind"
