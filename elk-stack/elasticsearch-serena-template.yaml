apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-serena-template
  namespace: elk-stack
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: elk-stack
data:
  serena-index-template.json: |
    {
      "index_patterns": ["logs-serena", ".ds-logs-serena-*"],
      "data_stream": {},
      "priority": 200,
      "template": {
        "settings": {
          "number_of_shards": 1,
          "number_of_replicas": 0,
          "index.refresh_interval": "5s",
          "index.codec": "best_compression",
          "index.lifecycle.name": "serena-logs-kubeadm"
        },
        "mappings": {
          "dynamic": "strict",
          "properties": {
            "@timestamp": { "type": "date" },
            "event": {
              "properties": {
                "kind": { "type": "keyword" }
              }
            },
            "log": {
              "properties": {
                "level": { "type": "keyword" },
                "thread": { "type": "keyword" }
              }
            },
            "serena": {
              "properties": {
                "stream": { "type": "keyword" },
                "session_id": { "type": "keyword" },
                "project": { "type": "keyword" },
                "host": { "type": "keyword" },
                "version": { "type": "keyword" },
                "logger": { "type": "keyword" },
                "function": { "type": "keyword" },
                "line": { "type": "integer" },
                "message_hash": { "type": "keyword" },
                "quality": {
                  "properties": {
                    "score": { "type": "float" },
                    "flags": { "type": "keyword" }
                  }
                },
                "exported": { "type": "boolean" },
                "tool": {
                  "properties": {
                    "name": { "type": "keyword" },
                    "num_times_called": { "type": "integer" },
                    "input_tokens": { "type": "integer" },
                    "output_tokens": { "type": "integer" }
                  }
                }
              }
            },
            "message": { "type": "text" },
            "host": {
              "properties": {
                "os": {
                  "properties": {
                    "type": { "type": "keyword" }
                  }
                }
              }
            }
          }
        }
      },
      "_meta": {
        "description": "Serena MCP log data stream template",
        "managed_by": "elk-stack"
      }
    }
  serena-logs-ilm-kind.json: |
    {
      "policy": {
        "phases": {
          "hot": {
            "min_age": "0ms",
            "actions": {
              "rollover": {
                "max_age": "3d",
                "max_primary_shard_size": "10gb"
              }
            }
          },
          "delete": {
            "min_age": "7d",
            "actions": {
              "delete": {}
            }
          }
        }
      }
    }
  serena-logs-ilm-kubeadm.json: |
    {
      "policy": {
        "phases": {
          "hot": {
            "min_age": "0ms",
            "actions": {
              "rollover": {
                "max_age": "7d",
                "max_primary_shard_size": "25gb"
              }
            }
          },
          "delete": {
            "min_age": "30d",
            "actions": {
              "delete": {}
            }
          }
        }
      }
    }
