apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-vllm-distill-setup
  namespace: elk-stack
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: elk-stack
    app.kubernetes.io/component: vllm-distill-setup
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: elasticsearch-vllm-distill-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:8.5.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ES_URL
              value: "http://elasticsearch:9200"
            - name: ILM_POLICY
              value: "vllm-distill-kubeadm"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              wait_for_es() {
                i=0
                while [ "$i" -lt 60 ]; do
                  if curl -sf "${ES_URL}/_cluster/health" >/dev/null; then
                    return 0
                  fi
                  i=$((i + 1))
                  sleep 5
                done
                echo "Elasticsearch not ready at ${ES_URL}" >&2
                return 1
              }
              wait_for_es
              ILM_POLICY="${ILM_POLICY:-vllm-distill-kubeadm}"
              TEMPLATE_FILE="$(mktemp)"
              sed "s/\"index.lifecycle.name\": \"vllm-distill-kubeadm\"/\"index.lifecycle.name\": \"${ILM_POLICY}\"/" \
                /config/vllm-distill-index-template.json > "${TEMPLATE_FILE}"
              curl -sfS -X PUT "${ES_URL}/_index_template/vllm-distill" \
                -H "Content-Type: application/json" \
                --data-binary @"${TEMPLATE_FILE}"
              curl -sfS -X PUT "${ES_URL}/_ilm/policy/vllm-distill-kind" \
                -H "Content-Type: application/json" \
                --data-binary @/config/vllm-distill-ilm-kind.json
              curl -sfS -X PUT "${ES_URL}/_ilm/policy/vllm-distill-kubeadm" \
                -H "Content-Type: application/json" \
                --data-binary @/config/vllm-distill-ilm-kubeadm.json
              echo "vLLM distill index template and ILM policies applied (default ILM: ${ILM_POLICY})"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: elasticsearch-vllm-distill-template
