name: K8s Manifest Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            elk-stack/*.yaml \
            prometheus/*.yaml \
            nexus/*.yaml \
            nginx/*.yaml \
            vllm/base/*.yaml \
            vllm/components/amd/*.yaml \
            vllm/components/finetune/*.yaml \
            vllm/benchmark/*.yaml \
            kind/*.yaml \
            kind/addons/*.yaml \
            argocd/apps/*.yaml

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          wget -q https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xzf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          find . -name '*.yaml' \
            -not -path './.github/*' \
            -not -path './data/*' \
            -not -path './gitlab/*' \
            -not -path './jenkins/*' \
            -not -path './cert-manager/cert-manager.custom.yaml' \
            -not -name 'kustomization.yaml' \
            -not -name 'values.yaml' \
            -not -name 'Chart.yaml' \
            -not -name 'Chart.lock' \
            -not -name 'nginx-ingress.yaml' \
            -not -name 'prometheus-values.yaml' \
            | xargs kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -ignore-missing-schemas

  kustomize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kustomize builds
        run: |
          set -euo pipefail
          for dir in \
            kubeadm/addons \
            kind/addons \
            vllm/base \
            vllm/components/amd \
            vllm/components/finetune \
            vllm/benchmark \
            vllm/overlays/kubeadm \
            vllm/overlays/kubeadm/amd \
            vllm/overlays/kubeadm/finetune \
            vllm/overlays/kind \
            vllm/overlays/kind/amd \
            vllm/overlays/kind/finetune \
            nginx; do
            echo "kubectl kustomize ${dir}"
            kubectl kustomize "${dir}" --load-restrictor LoadRestrictionsNone > /dev/null
          done

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

