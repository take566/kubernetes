# Example only — do NOT commit real tokens. Apply manually before syncing github-runners.
#
# Option A: Personal Access Token (classic) with repo / admin:org scope
# kubectl create namespace github-runners
# kubectl apply -f github-runners-secret.example.yaml -n github-runners
#
# Option B: GitHub App (recommended for org-level) — uncomment github_app_* keys instead.
apiVersion: v1
kind: Secret
metadata:
  name: github-runners-secret
  namespace: github-runners
type: Opaque
stringData:
  # Variation A — PAT (example placeholder only)
  github_token: "ghp_REPLACE_WITH_YOUR_PAT"

  # Variation B — GitHub App (uncomment and remove github_token above)
  # github_app_id: "123456"
  # github_app_installation_id: "654321"
  # github_app_private_key: |
  #   -----BEGIN RSA PRIVATE KEY-----
  #   REPLACE_WITH_YOUR_PRIVATE_KEY
  #   -----END RSA PRIVATE KEY-----
