apiVersion: batch/v1
kind: Job
metadata:
  name: vllm-benchmark
  namespace: vllm
  labels:
    app: vllm-benchmark
    app.kubernetes.io/name: vllm-benchmark
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: vllm-benchmark
        app.kubernetes.io/name: vllm-benchmark
        app.kubernetes.io/part-of: vllm
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 8.8.8.8
          - 1.1.1.1
        searches:
          - vllm.svc.cluster.local
          - svc.cluster.local
          - cluster.local
      restartPolicy: Never
      containers:
        - name: benchmark
          # Slim image with aiohttp; perf optional via PERF_ENABLE
          image: python:3.11-slim-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              pip install --no-cache-dir aiohttp
              # ConfigMap mounts are read-only; invoke via bash/python directly
              /scripts/run_benchmark.sh
          envFrom:
            - configMapRef:
                name: vllm-benchmark-config
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: results
              mountPath: /tmp/vllm-bench
      volumes:
        - name: scripts
          configMap:
            name: vllm-benchmark-scripts
            defaultMode: 0755
        - name: results
          emptyDir: {}
