apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# AMD ROCm LoRA fine-tune Job (no PV). Compose via overlays/*/finetune.
namespace: vllm
labels:
  - pairs:
      app.kubernetes.io/part-of: vllm
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
    includeTemplates: false
resources:
  - finetune-configmap.yaml
  - finetune-entrypoint-configmap.yaml
  - finetune-job.yaml
configMapGenerator:
  - name: finetune-script
    files:
      - train_lora.py=scripts/train_lora.py
generatorOptions:
  disableNameSuffixHash: true
