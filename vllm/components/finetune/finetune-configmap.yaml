apiVersion: v1
kind: ConfigMap
metadata:
  name: finetune-config
  namespace: vllm
  labels:
    app: vllm-finetune
    app.kubernetes.io/name: vllm-finetune
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
data:
  # --- Model & paths ---
  # Overlays patch per cluster. Default matches kubeadm inference (Qwen2.5-1.5B).
  BASE_MODEL: "Qwen/Qwen2.5-1.5B-Instruct"
  DATASET_PATH: "/data/dataset"
  OUTPUT_DIR: "/data/output"
  HF_HOME: "/data/huggingface"
  DATASET_TEXT_FIELD: "text"

  # --- LoRA ---
  LORA_R: "16"
  LORA_ALPHA: "32"
  LORA_DROPOUT: "0.05"
  LORA_TARGET_MODULES: "q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj"

  # --- Training (AMD-tuned defaults) ---
  # bf16 is preferred on MI200/MI300; disable 4bit unless bitsandbytes ROCm is verified on your cluster.
  USE_BF16: "true"
  USE_FP16: "false"
  USE_4BIT: "false"
  ATTN_IMPLEMENTATION: "sdpa"
  GRADIENT_CHECKPOINTING: "true"
  TORCH_COMPILE: "false"
  NUM_EPOCHS: "1"
  PER_DEVICE_BATCH_SIZE: "2"
  GRADIENT_ACCUMULATION_STEPS: "8"
  LEARNING_RATE: "2e-4"
  WARMUP_RATIO: "0.03"
  MAX_SEQ_LENGTH: "2048"
  DATALOADER_NUM_WORKERS: "4"
  DATALOADER_PIN_MEMORY: "true"
  LOGGING_STEPS: "10"
  SAVE_STEPS: "200"
  SAVE_TOTAL_LIMIT: "2"
  PACKING: "false"
  TRUST_REMOTE_CODE: "false"

  # Pinned deps installed once per Job start (bake into a custom image for faster cold starts).
  PIP_PACKAGES: >-
    transformers==4.51.3
    peft==0.15.2
    trl==0.16.1
    datasets==3.5.0
    accelerate==1.6.0
    sentencepiece==0.2.0
    protobuf==5.29.4
    safetensors==0.5.3
