apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vllm
labels:
  - pairs:
      app.kubernetes.io/part-of: vllm
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
    includeTemplates: false
resources:
  - distill-collector-configmap.yaml
  - distill-prompts-configmap.yaml
  - distill-collector-deployment.yaml
configMapGenerator:
  - name: distill-collector-script
    files:
      - distill_collector.py=scripts/distill_collector.py
generatorOptions:
  disableNameSuffixHash: true
