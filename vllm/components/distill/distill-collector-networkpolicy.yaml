# Minimal egress allow: distill-collector -> Teacher vLLM + Logstash TCP :5000 + DNS.
# Repo convention: deny-by-default only in agents/; vllm uses scoped allow rules.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: distill-collector-egress
  namespace: vllm
  labels:
    app: distill-collector
    app.kubernetes.io/name: distill-collector
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app: distill-collector
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: vllm
      ports:
        - protocol: TCP
          port: 8000
    - to:
        - namespaceSelector:
            matchLabels:
              name: elk-stack
          podSelector:
            matchLabels:
              app: logstash
      ports:
        - protocol: TCP
          port: 5000
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
