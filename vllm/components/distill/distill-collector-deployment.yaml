apiVersion: apps/v1
kind: Deployment
metadata:
  name: distill-collector
  namespace: vllm
  labels:
    app: distill-collector
    app.kubernetes.io/name: distill-collector
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: distill-collector
  template:
    metadata:
      labels:
        app: distill-collector
        app.kubernetes.io/name: distill-collector
        app.kubernetes.io/part-of: vllm
    spec:
      containers:
        - name: collector
          image: python:3.11-slim-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              pip install --no-cache-dir aiohttp
              exec python /scripts/distill_collector.py
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: distill-collector-config
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: prompts
              mountPath: /config
      volumes:
        - name: scripts
          configMap:
            name: distill-collector-script
            defaultMode: 0755
        - name: prompts
          configMap:
            name: distill-prompts
