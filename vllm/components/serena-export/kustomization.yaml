apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vllm
labels:
  - pairs:
      app.kubernetes.io/part-of: vllm
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
    includeTemplates: false
resources:
  - serena-export-configmap.yaml
  - serena-export-cronjob.yaml
  - serena-export-networkpolicy.yaml
configMapGenerator:
  - name: serena-export-script
    files:
      - serena_export.py=scripts/serena_export.py
generatorOptions:
  disableNameSuffixHash: true
