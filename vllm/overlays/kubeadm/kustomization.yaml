apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vllm
labels:
  - pairs:
      app.kubernetes.io/part-of: vllm
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/cluster: kubeadm
    includeSelectors: false
    includeTemplates: false
resources:
  - ../../base
  - vllm-pvc.yaml
patches:
  - path: model-patch.yaml
  # Longhorn: uncomment after `apply-addons.sh --with-longhorn` (3+ workers recommended)
  # - path: longhorn-storage-patch.yaml
