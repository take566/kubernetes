apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: vllm
data:
  # Production default — see vllm/docs/MODEL_SELECTION.md
  VLLM_MODEL: "Qwen/Qwen2.5-1.5B-Instruct"
  VLLM_EXTRA_ARGS: >-
    --gpu-memory-utilization 0.92
    --max-num-seqs 256
    --max-model-len 8192
    --max-num-batched-tokens 8192
    --enable-prefix-caching
    --enable-chunked-prefill
    --disable-log-requests
