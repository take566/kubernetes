apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
spec:
  template:
    spec:
      containers:
        - name: vllm
          # Official vllm/vllm-openai requires CUDA. Use CPU build for kind/Mac.
          image: openeuler/vllm-cpu:0.20.1-oe2403sp3
          imagePullPolicy: IfNotPresent
          env:
            - name: VLLM_DEVICE
              value: cpu
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "2"
            - name: VLLM_CPU_OMP_THREADS_BIND
              value: "0-3"
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              exec python3 -m vllm.entrypoints.openai.api_server \
                --model "${VLLM_MODEL}" \
                --host "${VLLM_HOST}" \
                --port "${VLLM_PORT}" \
                ${VLLM_EXTRA_ARGS}
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          securityContext:
            capabilities:
              add:
                - SYS_NICE
      securityContext:
        seccompProfile:
          type: Unconfined
