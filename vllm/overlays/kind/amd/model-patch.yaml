apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: vllm
data:
  VLLM_MODEL: "Qwen/Qwen2.5-0.5B-Instruct"
  VLLM_EXTRA_ARGS: >-
    --gpu-memory-utilization 0.85
    --max-num-seqs 32
    --max-model-len 4096
    --max-num-batched-tokens 2048
    --enforce-eager
    --enable-prefix-caching
    --enable-chunked-prefill
    --disable-log-requests
