apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: vllm
data:
  # Fast smoke model for kind / CI — see vllm/docs/MODEL_SELECTION.md
  VLLM_MODEL: "Qwen/Qwen2.5-0.5B-Instruct"
  VLLM_EXTRA_ARGS: >-
    --max-num-seqs 4
    --max-model-len 2048
    --max-num-batched-tokens 1024
    --enforce-eager
    --disable-log-requests
