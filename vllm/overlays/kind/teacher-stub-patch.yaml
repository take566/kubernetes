apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
spec:
  template:
    spec:
      containers:
        - name: vllm
          image: distill-collector:3.11-aiohttp
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /stub/openai_stub.py
          env:
            - name: VLLM_HOST
              value: "0.0.0.0"
            - name: VLLM_PORT
              value: "8000"
          envFrom:
            - configMapRef:
                name: vllm-config
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          volumeMounts:
            - name: teacher-stub
              mountPath: /stub
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: teacher-stub
          configMap:
            name: teacher-stub-script
            defaultMode: 0755
