# Copy to vllm-secret.yaml and apply when using gated Hugging Face models.
# Do not commit vllm-secret.yaml (contains credentials).
apiVersion: v1
kind: Secret
metadata:
  name: vllm-secret
  namespace: vllm
  labels:
    app: vllm
    app.kubernetes.io/part-of: vllm
type: Opaque
stringData:
  HF_TOKEN: "hf_xxxxxxxxxxxxxxxxxxxxxxxx"
