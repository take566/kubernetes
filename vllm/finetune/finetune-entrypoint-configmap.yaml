apiVersion: v1
kind: ConfigMap
metadata:
  name: finetune-entrypoint
  namespace: vllm
  labels:
    app: vllm-finetune
    app.kubernetes.io/name: vllm-finetune
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
data:
  entrypoint.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    echo "=== AMD ROCm LoRA fine-tune (TRL + PEFT) ==="
    python3 - <<'PY'
    import torch
    print("torch:", torch.__version__)
    print("hip/cuda available:", torch.cuda.is_available())
    if torch.cuda.is_available():
        print("device:", torch.cuda.get_device_name(0))
    PY

    pip install --no-cache-dir ${PIP_PACKAGES}
    exec python3 /scripts/train_lora.py
