apiVersion: v1
kind: PersistentVolume
metadata:
  name: vllm-finetune-dataset-pv
  labels:
    app: vllm-finetune
    app.kubernetes.io/part-of: vllm
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  hostPath:
    path: /data/vllm/finetune/dataset
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-finetune-dataset
  namespace: vllm
  labels:
    app: vllm-finetune
    app.kubernetes.io/name: vllm-finetune
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
