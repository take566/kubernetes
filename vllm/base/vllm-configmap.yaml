apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: vllm
  labels:
    app: vllm
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
data:
  # Base fallback (overlays patch per cluster). See vllm/docs/MODEL_SELECTION.md
  VLLM_MODEL: "facebook/opt-125m"
  VLLM_HOST: "0.0.0.0"
  VLLM_PORT: "8000"
  # Performance-tuned defaults (override per model/GPU after vllm/benchmark/ baseline).
  # Tune with: kubectl apply -k vllm/benchmark/ then compare JSON logs before/after.
  VLLM_EXTRA_ARGS: >-
    --gpu-memory-utilization 0.92
    --max-num-seqs 256
    --max-model-len 4096
    --enable-prefix-caching
    --disable-log-requests
  HF_HOME: "/data/huggingface"
