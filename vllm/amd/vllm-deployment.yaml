apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app: vllm
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
        app.kubernetes.io/name: vllm
        app.kubernetes.io/part-of: vllm
        app.kubernetes.io/managed-by: kustomize
    spec:
      # Uncomment when AMD GPU nodes are tainted
      # tolerations:
      #   - key: amd.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      # Uncomment when AMD GPU Node Labeller is deployed
      # nodeSelector:
      #   amd.com/gpu.present: "true"
      containers:
        - name: vllm
          image: vllm/vllm-openai-rocm:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              exec python3 -m vllm.entrypoints.openai.api_server \
                --model "${VLLM_MODEL}" \
                --host "${VLLM_HOST}" \
                --port "${VLLM_PORT}" \
                ${VLLM_EXTRA_ARGS}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vllm-config
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vllm-secret
                  key: HF_TOKEN
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vllm-secret
                  key: HF_TOKEN
                  optional: true
            - name: PYTORCH_HIP_ALLOC_CONF
              value: "expandable_segments:True"
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              amd.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 16Gi
              amd.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /data/huggingface
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
