apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: vllm
  labels:
    app: vllm
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: vllm
    app.kubernetes.io/managed-by: kustomize
data:
  VLLM_MODEL: "facebook/opt-125m"
  VLLM_HOST: "0.0.0.0"
  VLLM_PORT: "8000"
  # ROCm: lower max-num-seqs than NVIDIA; validate with vllm/benchmark/ on MI210/MI300.
  VLLM_EXTRA_ARGS: >-
    --gpu-memory-utilization 0.90
    --max-num-seqs 128
    --max-model-len 4096
    --enable-prefix-caching
    --disable-log-requests
  HF_HOME: "/data/huggingface"
